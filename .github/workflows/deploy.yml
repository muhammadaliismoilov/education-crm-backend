
name: Deploy Education CRM (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Copy project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/,package.json,package-lock.json,src/migrations/"
          target: "/var/www/education-crm"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            cd /var/www/education-crm
            # Faqat production dependencies o'rnatish
            npm install --omit=dev
            # PM2 o'rnatish (yo'q bo'lsa)
            npm install -g pm2
            # Migrationlarni bajarish
            node dist/data-source.js migration:run || npx typeorm migration:run -d dist/data-source.js || echo "Migration skipped"
            # Restart
            pm2 delete education-crm || true
            pm2 start dist/main.js --name education-crm
            pm2 save